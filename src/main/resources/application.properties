spring.application.name=LibraryProject
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MongoDB
spring.mongodb.uri=mongodb://localhost:27017/library_logs
spring.mongodb.database=library_logs

# File upload
file.max-size=10485760
file.allowed-types=image/jpeg,image/png,image/jpg,application/pdf,text/plain

jwt.secret=KZr8v9L1mQ2nV7pXy4f+G3hT8jU1sQ6yM0wR2aS9bV7xL1pE
jwt.expiration=86400000

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=user-async-

# Cache Configuration
spring.cache.type=caffeine

#Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs